<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 스타일 시작 페이지</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="container">
        <!-- 상단 시계 및 날짜 -->
        <header class="header">
            <div id="greeting" class="greeting">반가워요!</div>
            <div id="clock" class="clock">00:00:00</div>
            <div id="date" class="date">2026년 4월 9일 목요일</div>
        </header>

        <!-- 중앙 검색 바 (네이버 스타일) -->
        <section class="search-section">
            <form action="https://search.naver.com/search.naver" method="GET" class="search-form">
                <input type="text" name="query" placeholder="검색어를 입력해 주세요." class="search-input" autocomplete="off">
                <button type="submit" class="search-btn">
                    <svg viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </button>
            </form>
        </section>

        <!-- 하단 위젯 레이아웃 -->
        <div class="widgets-grid">
            <!-- 날씨 위젯 -->
            <div class="widget-card weather-card">
                <div class="widget-header">
                    <h3><i class="fas fa-cloud-sun"></i> 실시간 날씨</h3>
                    <button id="refresh-weather" class="refresh-btn-mini" title="새로고침">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    </button>
                </div>
                <div id="weather-content" class="loading">정보를 불러오는 중...</div>
            </div>

            <!-- 뉴스 위젯 -->
            <div class="widget-card news-card">
                <div class="widget-header">
                    <h3><i class="fas fa-newspaper"></i> 주요 뉴스</h3>
                    <button id="refresh-news" class="refresh-btn-mini" title="새로고침">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    </button>
                </div>
                <div id="news-content" class="loading">최신 뉴스를 가져오는 중...</div>
            </div>
        </div>

        <!-- 퀵 링크 -->
        <nav class="quick-links">
            <a href="https://naver.com" target="_blank" class="link-item">
                <div class="icon" style="color:#03C75A; font-weight:bold;">N</div>
                <span>네이버</span>
            </a>
            <a href="calendar.html" class="link-item">
               <div class="icon">📅</div>
                <span>내 캘린더</span>
            </a>
            <a href="https://blog.naver.com" target="_blank" class="link-item">
                <div class="icon">📝</div>
                <span>블로그</span>
            </a>
            <a href="https://cafe.naver.com" target="_blank" class="link-item">
                <div class="icon">☕</div>
                <span>카페</span>
            </a>
        </nav>
    </main>

    <script src="app.js"></script>
</body>
</html>
